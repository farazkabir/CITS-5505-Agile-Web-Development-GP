{% extends "base.html" %} {% block title %}Forgot Password | NewsPulse{%
endblock %} {% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="glass rounded-4 p-4 p-md-5 shadow-sm">
        <div class="text-center mb-4">
          <div class="brand-icon mx-auto mb-3">
            <i class="bi bi-shield-lock"></i>
          </div>

          <h1 class="h4 fw-bold mb-2">Forgot Password?</h1>

          <p class="small text-body-secondary mb-0">
            Enter your email address and we’ll help you recover access to your
            account.
          </p>
        </div>

        <form method="POST" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <div class="mb-3">
            <label for="email" class="form-label small fw-semibold">
              Email Address
            </label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Send Recovery Instructions
          </button>
        </form>

        <div class="text-center mt-4">
          <a
            href="{{ url_for('main.signin') }}"
            class="small text-decoration-none"
          >
            <i class="bi bi-arrow-left me-1"></i>
            Back to Sign In
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
